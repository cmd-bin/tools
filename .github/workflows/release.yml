name: Release
on:
  push:
    branches:
      - main # or master
      - next
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for trusted publishing and npm provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Install dependencies
        run: npm clean-install
      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: npm audit signatures
      - name: Setup Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Release (Main)
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          CURRENT_VERSION=$(node -e "console.log(require('./packages/react-native/package.json').version)")
          if [[ "$CURRENT_VERSION" == *"-next."* ]]; then
            # Merge from next branch! Graduate the prerelease (e.g., 1.5.0-next.2 -> 1.5.0)
            TARGET_VERSION=$(echo "$CURRENT_VERSION" | cut -d'-' -f1)
            npx nx release $TARGET_VERSION --yes
          else
            # Normal push to main. Use standard conventional commits.
            npx nx release --yes
          fi

      - name: Release (Next)
        if: github.ref == 'refs/heads/next'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          npm_config_tag: "next"
        run: npx nx release --yes --preid next
