name: Publish
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - run: npm ci
      
      # JSR'a Yayınla (Saf TypeScript)
      - name: Publish to JSR
        run: npx jsr publish

      # npm için Derle ve Yayınla (JavaScript)
      - name: Build and Publish to npm
        run: |
          npm run build
          # npm yayını için bin, main ve types alanlarını güncelle
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.bin='./dist/index.js'; pkg.main='./dist/index.js'; pkg.types='./dist/index.d.ts'; fs.writeFileSync('package.json',JSON.stringify(pkg,null,2));"
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
