name: Publish
on: 
  workflow_call
  # push:
  #   branches:
  #     - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - run: npm ci 
      - name: Publish package
        run: npx jsr publish
